name: Sync Plugin Version

run-name: Sync plugin version by Natroc Bot

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-plugin-version-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  sync-version:
    name: Sync marketplace version
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Create Natroc Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Configure Natroc Bot Git identity
        run: |
          BOT_SLUG="${{ steps.app-token.outputs.app-slug }}"
          BOT_ID="$(gh api "/users/${BOT_SLUG}[bot]" --jq '.id')"

          git config --global user.name "${BOT_SLUG}[bot]"
          git config --global user.email "${BOT_ID}+${BOT_SLUG}[bot]@users.noreply.github.com"

          gh auth setup-git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Read package version
        id: package
        run: |
          VERSION="$(node -p "require('./package.json').version")"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Sync marketplace version
        run: node scripts/sync-version.js

      - name: Commit and push changes
        run: |
          git add .claude-plugin/marketplace.json

          if git diff --cached --quiet; then
            echo "No version changes."
            exit 0
          fi

          git commit -m "chore: sync marketplace version to ${{ steps.package.outputs.version }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
