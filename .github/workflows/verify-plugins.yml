name: Verify Plugins

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-plugins-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-plugins:
    name: Check plugin structure
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3

      - name: Verify plugins
        run: node scripts/verify-plugins.js
