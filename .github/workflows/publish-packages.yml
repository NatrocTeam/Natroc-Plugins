name: Publish @natroc/plugins to npm and GitHub Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: publish-packages-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: packages
    shell: bash

jobs:
  publish:
    name: Build & publish to npm and GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Read version from packages/package.json
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version from package.json: ${VERSION}"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Verify output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "dist/index.js ready ($(wc -c < dist/index.js) bytes)"

      - name: Publish to npm
        id: publish_npm
        run: |
          set +e
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@natroc/plugins@${VERSION}" version &>/dev/null; then
            echo "Version ${VERSION} already exists on npm, skipping"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          else
            npm publish --provenance --access public
            PUBLISH_EXIT=$?
            if [ $PUBLISH_EXIT -ne 0 ]; then
              echo "result=failed" >> "$GITHUB_OUTPUT"
              echo "npm publish failed with exit code ${PUBLISH_EXIT}, continuing..."
            else
              echo "result=published" >> "$GITHUB_OUTPUT"
              echo "Published @natroc/plugins@${VERSION} to npm"
            fi
          fi
          set -e
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          set +e
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> "${NPM_CONFIG_USERCONFIG}"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@natroc/plugins@${VERSION}" version --registry https://npm.pkg.github.com &>/dev/null; then
            echo "Version ${VERSION} already exists on GitHub Packages, skipping"
          else
            npm publish --registry https://npm.pkg.github.com --access public
            PUBLISH_EXIT=$?
            if [ $PUBLISH_EXIT -ne 0 ]; then
              echo "GitHub Packages publish failed with exit code ${PUBLISH_EXIT}, continuing..."
            else
              echo "Published @natroc/plugins@${VERSION} to GitHub Packages"
            fi
          fi
          set -e
