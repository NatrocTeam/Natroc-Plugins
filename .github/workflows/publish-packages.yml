name: Publish @natroc/plugins to npm and GitHub Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: publish-packages-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: packages
    # Fail fast on any error, unset variable, or failed command in a pipe.
    shell: bash -euo pipefail {0}

jobs:
  publish:
    name: Build & publish to npm and GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/
          cache: pnpm
          cache-dependency-path: packages/pnpm-lock.yaml

      - name: Read version from packages/package.json
        id: version
        run: |
          if [ ! -f package.json ]; then
            echo "::error::packages/package.json not found"
            exit 1
          fi
          VERSION="$(node -p "require('./package.json').version")"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "undefined" ]; then
            echo "::error::Could not read a valid 'version' from packages/package.json"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version from packages/package.json: ${VERSION}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::Build failed: dist/index.js not found"
            exit 1
          fi
          SIZE="$(wc -c < dist/index.js)"
          if [ "${SIZE}" -eq 0 ]; then
            echo "::error::Build failed: dist/index.js is empty"
            exit 1
          fi
          echo "dist/index.js ready (${SIZE} bytes)"

      - name: Publish to npm
        id: publish_npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          # `npm view` exits non-zero when the version does not exist, which is
          # expected; guard it so `set -e` does not abort the step.
          if npm view "@natroc/plugins@${VERSION}" version > /dev/null 2>&1; then
            echo "Version ${VERSION} already exists on npm, skipping"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing @natroc/plugins@${VERSION} to npm..."
            npm publish --provenance --access public
            echo "result=published" >> "$GITHUB_OUTPUT"
            echo "Published @natroc/plugins@${VERSION} to npm"
          fi

      - name: Publish to GitHub Packages
        id: publish_gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          # GitHub Packages requires the npm scope to match the repository owner.
          # The repo owner is "NatrocTeam", so the package is published there as
          # @NatrocTeam/plugins (npmjs keeps the original @natroc/plugins name).
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::GITHUB_TOKEN is not available"
            exit 1
          fi

          # Lowercase the owner for the registry scope/auth lines (npm scopes are
          # lowercase) while keeping the original case for the package name.
          GH_OWNER_LC="$(printf '%s' "${GH_OWNER}" | tr '[:upper:]' '[:lower:]')"
          export GH_PKG_NAME="@${GH_OWNER}/plugins"

          # Write a dedicated .npmrc for GitHub Packages only
          # (the setup-node generated file has an incompatible format for this registry).
          {
            printf '@%s:registry=https://npm.pkg.github.com/\n' "${GH_OWNER_LC}"
            printf '//npm.pkg.github.com/:_authToken=%s\n' "${GH_TOKEN}"
          } > .gh-npmrc

          # Temporarily rewrite the package "name" so it matches the repo owner
          # scope required by GitHub Packages. Always restore package.json and
          # remove the token file, even if publishing fails.
          cp package.json package.json.bak
          trap 'mv -f package.json.bak package.json 2>/dev/null || true; rm -f .gh-npmrc' EXIT
          node -e "const fs=require('fs');const p=require('./package.json');p.name=process.env.GH_PKG_NAME;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"

          if npm view "${GH_PKG_NAME}@${VERSION}" version --registry https://npm.pkg.github.com --userconfig .gh-npmrc > /dev/null 2>&1; then
            echo "Version ${VERSION} already exists on GitHub Packages, skipping"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing ${GH_PKG_NAME}@${VERSION} to GitHub Packages..."
            npm publish --registry https://npm.pkg.github.com --userconfig .gh-npmrc
            echo "result=published" >> "$GITHUB_OUTPUT"
            echo "Published ${GH_PKG_NAME}@${VERSION} to GitHub Packages"
          fi

      - name: Publish summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NPM_RESULT: ${{ steps.publish_npm.outputs.result }}
          GH_RESULT: ${{ steps.publish_gh.outputs.result }}
        run: |
          {
            echo "### Publish summary"
            echo ""
            echo "| Target | Version | Result |"
            echo "| --- | --- | --- |"
            echo "| npm | ${VERSION:-unknown} | ${NPM_RESULT:-not-run} |"
            echo "| GitHub Packages | ${VERSION:-unknown} | ${GH_RESULT:-not-run} |"
          } >> "$GITHUB_STEP_SUMMARY"
