name: Bug or improvement
description: Report a bug or suggest an improvement for a plugin.
title: "bug: "
labels: ["triage"]
body:
  - type: dropdown
    id: type
    attributes:
      label: What is this?
      description: Are you reporting a bug or suggesting an improvement?
      options:
        - Bug report
        - Plugin improvement
    validations:
      required: true

  - type: checkboxes
    id: affected-plugins
    attributes:
      label: Affected plugin
      description: Select the relevant plugin(s).
      options:
        - label: 21st
        - label: anthropic-sdk
        - label: bybit
        - label: code-review
        - label: context7
        - label: expo
        - label: human-context-writer
        - label: midtrans
        - label: motion
        - label: natroc-awareness
        - label: nextjs
        - label: ollama-sdk
        - label: openai-sdk
        - label: plugin-dev-claude
        - label: plugin-dev-codex
        - label: react-typescript
        - label: stitch
        - label: supabase
        - label: threejs
        - label: typescript-lsp
        - label: xquik

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug or improvement in one or two sentences.
      placeholder: |
        Bug: Installing plugin X fails with error ...
        Improvement: Plugin X should support ...
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: |
        **For bugs:** What happened? What did you expect? Steps to reproduce. Logs or error output.

        **For improvements:** How does it work now? What should change? Why is this needed?
      placeholder: |
        Current behavior: ...
        Expected behavior: ...
        Steps to reproduce (if bug): ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Marketplace release version if known.
      placeholder: "example: 1.9.0"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Claude Code/Codex version if relevant.
      placeholder: |
        OS:
        Node.js:
        Claude Code/Codex:
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to docs, repos, or examples that support this issue.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
