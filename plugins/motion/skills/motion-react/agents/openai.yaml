interface:
  display_name: "Motion - React"
  short_description: "Motion components, variants, gestures, layout animations, and scroll-driven motion."
  icon_small: "./assets/motion.png"
  icon_large: "./assets/motion.png"
  brand_color: "#FFF62A"
  default_prompt: "Animate a React component's mount with a spring scale and fade using motion.div and AnimatePresence, then add a whileHover gesture that scales the card up and a whileTap that shrinks it slightly on click."

policy:
  allow_implicit_invocation: true
