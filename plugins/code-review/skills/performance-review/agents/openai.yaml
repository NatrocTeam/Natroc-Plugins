interface:
  display_name: "Code Review - Performance Review"
  short_description: "Audit frontend, backend, and database performance."
  icon_small: "./assets/logo.svg"
  icon_large: "./assets/logo.svg"
  brand_color: "#2563EB"
  default_prompt: "Review the codebase for performance risks. Check frontend bundle size, unnecessary rerenders, large list rendering, slow database queries, N+1 patterns, missing caching, memory leaks, and blocking operations."

policy:
  allow_implicit_invocation: true
