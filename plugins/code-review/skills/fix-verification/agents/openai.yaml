interface:
  display_name: "Code Review - Fix Verification"
  short_description: "Verify fixes with lint, tests, and audits."
  icon_small: "./assets/logo.svg"
  icon_large: "./assets/logo.svg"
  brand_color: "#2563EB"
  default_prompt: "Verify that applied fixes are correct and complete. Run lint, typecheck, tests, and build commands. Perform targeted audits on changed code. Record exact command output and report PASS or FAIL with evidence for each fix."

policy:
  allow_implicit_invocation: true
