interface:
  display_name: "Code Review - API Contract Review"
  short_description: "Review frontend-backend API contracts and schemas."
  icon_small: "./assets/logo.svg"
  icon_large: "./assets/logo.svg"
  brand_color: "#2563EB"
  default_prompt: "Review the API contract between frontend and backend. Check request and response schemas, status codes, error handling, pagination, filtering, sorting, versioning, and timezone behavior. Identify inconsistencies, missing validations, and contract violations."

policy:
  allow_implicit_invocation: true
