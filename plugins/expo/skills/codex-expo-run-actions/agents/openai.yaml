interface:
  display_name: "Expo - Codex Expo Run Actions"
  short_description: "Wire Expo projects into the Codex app Run button and action terminal"
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Use $codex-expo-run-actions to create an Expo project-local run script, wire .codex/environments/environment.toml, expose a Codex app Run action, and optionally add direct iOS, Android, web, dev-client, tunnel, or export buttons."

policy:
  allow_implicit_invocation: true
