interface:
  display_name: "Expo - Native Data Fetching"
  short_description: "Network requests, caching, auth, offline support, and Expo Router data loaders."
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Set up data fetching in my Expo app with React Query for caching and stale-while-revalidate behavior, add an authenticated request wrapper that reads the auth token from secure storage, and configure an Expo Router loader that fetches screen data before navigation."

policy:
  allow_implicit_invocation: true
