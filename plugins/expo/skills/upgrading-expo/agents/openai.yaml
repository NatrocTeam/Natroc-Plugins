interface:
  display_name: "Expo - Upgrading"
  short_description: "Upgrade Expo SDKs, fix dependencies, and migrate deprecated packages."
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Upgrade my Expo project from SDK 52 to SDK 55, run expo-doctor to identify breaking changes, resolve dependency conflicts in package.json, clear the prebuild cache, and migrate from a deprecated package to its replacement."

policy:
  allow_implicit_invocation: true
