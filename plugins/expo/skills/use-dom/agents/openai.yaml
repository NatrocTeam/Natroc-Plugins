interface:
  display_name: "Expo - Use DOM"
  short_description: "Run web React code in native webviews using Expo DOM components."
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Migrate my existing React web component into Expo using the use dom directive, configure the DOM component props for webview rendering, expose native actions to the web side safely, and keep the DOM component on a separate route from native screens."

policy:
  allow_implicit_invocation: true
