interface:
  display_name: "Expo - Dev Client"
  short_description: "Create and use Expo development clients when Expo Go is not enough."
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Set up an Expo development client build with EAS for my project that needs a custom native module, configure a development profile that includes the native libraries, and connect the dev client to my local Metro bundler."

policy:
  allow_implicit_invocation: true
