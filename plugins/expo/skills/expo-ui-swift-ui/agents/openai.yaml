interface:
  display_name: "Expo - UI SwiftUI"
  short_description: "SwiftUI views and modifiers inside Expo React Native apps."
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Add a SwiftUI host tree to my Expo app, render native SwiftUI components with modifiers for frame, background, and font styling, and wrap the host view in an RNHostView for React Native interoperability."

policy:
  allow_implicit_invocation: true
