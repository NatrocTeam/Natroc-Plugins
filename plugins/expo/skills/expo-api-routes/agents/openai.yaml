interface:
  display_name: "Expo - API Routes"
  short_description: "Expo Router API routes for secrets, validation, webhooks, proxies, and EAS Hosting."
  icon_small: "./assets/expo.png"
  icon_large: "./assets/expo.png"
  brand_color: "#000020"
  default_prompt: "Create an Expo Router API route that reads a server-side secret from environment variables, validates an incoming webhook payload from Stripe, and returns a JSON response without exposing the secret to the client bundle."

policy:
  allow_implicit_invocation: true
